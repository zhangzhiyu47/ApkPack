name: Build StarDict APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Setup Android SDK and NDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -fsSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip"
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          export PATH="$HOME/android-sdk/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check bootstrap asset
        run: |
          if [ -f "app/src/main/assets/bootstrap.tar" ]; then
            echo "OK: bootstrap.tar found ($(ls -lh app/src/main/assets/bootstrap.tar | awk '{print $5}'))"
          else
            echo "WARNING: bootstrap.tar not found in assets"
            echo "Run locally: python3 bundle-app.py --bin <dir> --main <binary>"
            exit 1
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Package source code
        run: |
          tar czf /tmp/stardict-source.tar.gz \
            --exclude='.git' \
            --exclude='*/build' \
            --exclude='.gradle' \
            --exclude='local.properties' \
            --exclude='.cxx' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='*.tmp' \
            --exclude='*~' \
            .

      - name: Rename APK
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" app/build/outputs/apk/release/stardict.apk
          echo "APK: $APK -> stardict.apk"

      - name: Upload to GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: StarDict Latest
          body: |
            StarDict Terminal APK
          files: |
            app/build/outputs/apk/release/stardict.apk
            /tmp/stardict-source.tar.gz
          force_upload_token: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
